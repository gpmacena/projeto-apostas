name: Gerar página de apostas do dia

on:
  schedule:
    # Roda às 09:00 UTC = 06:00 BRT, antes dos jogos
    - cron: "0 9 * * *"
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Gerar página
        env:
          API_FOOTBALL_KEY: ${{ vars.API_FOOTBALL_KEY }}
        run: python scripts/generate.py

      - name: Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          commit_message: "chore: atualiza jogos do dia"
          force_orphan: true
